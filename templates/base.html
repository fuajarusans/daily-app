<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Daily App{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/static/img/emblem.png">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
            <a href="/" class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <img src="/static/img/emblem.png" alt="" class="h-9 w-9">
                <span>Daily App</span>
            </a>
            <span class="hidden sm:inline text-sm text-slate-400">— kumpulan tools harian lokal</span>
            <nav class="ml-auto flex items-center gap-2">
                <button id="enableNotif" type="button"
                        class="hidden text-sm px-2 py-1 rounded border border-slate-300 text-slate-600 hover:bg-slate-50"
                        title="Aktifkan notifikasi pengingat di browser ini">🔔 Aktifkan pengingat</button>
                <a href="/notes"
                   class="relative inline-flex items-center gap-1 text-sm font-medium text-slate-700 hover:text-blue-600 px-2 py-1 rounded hover:bg-slate-50">
                    📝 Catatan
                    <span class="js-reminder-badge hidden min-w-[18px] text-center text-[11px] font-bold text-white bg-red-500 rounded-full px-1.5 py-0.5">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-5xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
        Berjalan lokal di komputer Anda · File hasil dibersihkan otomatis
    </footer>

    <script src="/static/reminders.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
